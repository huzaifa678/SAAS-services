receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

  transform/logs:
    log_statements:
      - context: log
        statements:
          - set(attributes["message"], body)
          - set(attributes["log.level"], severity_text)
          - set(attributes["service.name"], resource.attributes["service.name"])
          - set(attributes["event.dataset"], "application")

  resource:
    attributes:
      - key: service.name
        from_attribute: service.name
        action: insert

exporters:

  otlp/elastic:
    endpoint: http://apm-server:8200
    tls:
      insecure: true

  elasticsearch:
    endpoints: ["http://elasticsearch:9200"]
    logs_index: "otel-logs"
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  otlphttp/logstash:
    endpoint: http://logstash:5000

service:
  pipelines:

    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/elastic]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [transform/logs, batch]
      exporters: [elasticsearch, otlphttp/logstash]