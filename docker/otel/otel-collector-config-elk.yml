receivers:
  otlp:
    protocols:
      http:
      grpc:

  filelog:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: beginning

processors:
  batch:

  resource:
    attributes:
      - action: insert
        key: log.resource.labels
        value: service.name, container_name
      - action: insert
        key: service.name
        value: "unknown-service"

exporters:

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlp/elastic:
    endpoint: http://apm-server:8200
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  otlphttp/logstash:
    endpoint: http://logstash:5000

service:
  pipelines:

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, otlp/elastic]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logstash]