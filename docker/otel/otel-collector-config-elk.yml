receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

  resource:
    attributes:
      - key: service.name
        from_attribute: service.name
        action: insert

exporters:

  otlp/elastic:
    endpoint: http://apm-server:8200
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  otlphttp/logstash:
    endpoint: http://logstash:5000

service:
  pipelines:

    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/elastic]

    metrics:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/logstash]