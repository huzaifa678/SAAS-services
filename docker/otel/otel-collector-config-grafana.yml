receivers:
  otlp:
    protocols:
      http:
      grpc:

  filelog:
    include:
      - /var/lib/docker/containers/*/*.log
    start_at: beginning

processors:
  batch:

  resource:
    attributes:
      - action: insert
        key: loki.resource.labels
        value: container_name,service.name

exporters:

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  otlp/elastic:
    endpoint: http://apm-server:8200
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    tls:
      insecure: true

service:
  pipelines:

    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, otlp/elastic]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp, filelog]
      processors: [batch]
      exporters: [loki]