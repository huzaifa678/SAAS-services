
services:
  auth-postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  subscription-postgres:
    image: postgres:16-alpine
    container_name: subscription-postgres
    environment:
      POSTGRES_USER: subscription_user
      POSTGRES_PASSWORD: subscription_password
      POSTGRES_DB: subscription_db
    ports:
      - "5433:5432"   
    volumes:
      - subscription_postgres_data:/var/lib/postgresql/data

  billing-postgres:
    image: postgres:16-alpine
    container_name: billing-postgres
    environment:
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_password
      POSTGRES_DB: billing_db
    ports:
      - "5434:5432"
    volumes:
      - billing_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./docker/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    networks:
      - usage-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - prometheus
      - loki
      - tempo
    profiles:
      - grafana
    environment:
      - GF_LOG_LEVEL=info
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-simple-json-datasource
    ports:
      - "3001:3000"  # Grafana UI
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - usage-network

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    profiles:
      - grafana
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./docker/loki:/etc/loki
    networks:
      - usage-network

  tempo:
    image: grafana/tempo:2.4.1
    container_name: tempo
    profiles:
      - grafana
    command: ["-config.file=/etc/tempo.yml"]
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"   
      - "4317:4317"   
      - "4318:4318"   
    networks:
      - usage-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    profiles:
      - elk
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - usage-network
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    profiles:
      - elk
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
      - "5001:5000"
    networks:
      - usage-network
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    profiles:
      - elk
    depends_on:
      - elasticsearch
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=I*8EnpQgrZ3Qx1P7GzRi
    healthcheck:
      test: ["CMD", "curl", "--write-out", "'%{http_code}'", "--silent", "--output", "/dev/null", "http://localhost:8200/"]
      retries: 10
      interval: 10s
    networks:
      - usage-network
    ports:
      - "5601:5601"

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    container_name: apm-server
    profiles:
      - elk
    depends_on:
      - elasticsearch
    ports:
      - "8200:8200"
    networks:
      - usage-network
    command: >
      apm-server -e
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
        -E output.elasticsearch.username=elastic
        -E output.elasticsearch.password=HD2QvEqZk1dKn-TL6web
        -E apm-server.data_streams.wait_for_integration=false
        -E apm-server.host=0.0.0.0:8200

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./docker/otel/otel-collector-config.yml:/etc/otel-collector-config.yml
      - otel_data:/var/otel
    ports:
      - "43180:4318"   
      - "43170:4317"   
      - "8889:8889" 
    networks:
      - usage-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_HOST://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      CLUSTER_ID: LshexmLSRjiD-5Z2hMkvbQ

    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - usage-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.1
    container_name: schema-registry-saas
    depends_on:
      - kafka
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:9094
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
    ports:
      - "9094:9094"
    networks:
      - usage-network

  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-saas
    ports:
      - "8090:8090"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  redis:
    image: redis:7
    container_name: redis-saas
    ports:
      - "6379:6379"

  liquibase_postgres:
    image: liquibase/liquibase:4.27
    container_name: liquibase-saas
    depends_on:
      - billing-postgres
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://billing-postgres:5432/billing_db
      LIQUIBASE_COMMAND_USERNAME: billing_user
      LIQUIBASE_COMMAND_PASSWORD: billing_password
    volumes:
      - ./docker/postgres:/liquibase/changelog
    working_dir: /liquibase/changelog
    entrypoint: [ "liquibase" ]
    command:
      - "--changeLogFile=changelog-master.yaml"
      - "update"
      - "--log-level=debug"

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    container_name: chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
  
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    user: root
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    command: mlflow server --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow

  usage-postgres:
    image: postgres:16-alpine
    container_name: usage-postgres
    environment:
      POSTGRES_USER: usage_user
      POSTGRES_PASSWORD: usage_password
      POSTGRES_DB: usage_db
    ports:
      - "5435:5432"
    volumes:
      - usage_postgres_data:/var/lib/postgresql/data
    networks:
      - usage-network

  keycloak:
    image: quay.io/keycloak/keycloak:21.1.1
    container_name: keycloak-saas
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    ports:
      - "8080:8079"
    depends_on:
      - keycloak-postgres

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres-saas
    environment:
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
      POSTGRES_DB: keycloak_db
    ports:
      - "5437:5432"
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  subscription_postgres_data:
  billing_postgres_data:
  usage_postgres_data:
  mlflow_data:
  chroma_data:
  grafana_data:
  kafka_data:
  tempo_data:
  elasticsearch_data:
  otel_data:
  keycloak_postgres_data:

networks:
  usage-network:
    external: true

