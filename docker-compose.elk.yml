services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus-elk
    volumes:
      - ./docker/prometheus:/etc/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector-elk
    profiles:
      - elk
    networks:
      - usage-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    profiles:
      - elk
    networks:
      - usage-network
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    container_name: logstash
    depends_on:
      - elasticsearch
    profiles:
      - elk
    ports:
      - "5044:5044"
      - "5001:5000"
    environment:
      LOGSTASH_USER: ${LOGSTASH_USER}
      LOGSTASH_PASSWORD: ${LOGSTASH_PASSWORD}
    networks:
      - usage-network
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: kibana
    depends_on:
      - elasticsearch
    profiles:
      - elk
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${ELASTIC_SEARCH_PASSWORD_KIBANA}
    ports:
      - "5601:5601"
    networks:
      - usage-network

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.13.4
    container_name: apm-server
    profiles:
      - elk
    depends_on:
      - elasticsearch
    ports:
      - "8200:8200"
    networks:
      - usage-network
    environment:
      ELASTIC_SEARCH_PASSWORD: ${ELASTIC_SEARCH_PASSWORD}
    command: >
      apm-server -e
        -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
        -E output.elasticsearch.username=elastic
        -E output.elasticsearch.password=${ELASTIC_SEARCH_PASSWORD}
        -E apm-server.data_streams.wait_for_integration=false
        -E apm-server.host=0.0.0.0:8200

  otel-collector-elk:
    image: otel/opentelemetry-collector-contrib:0.96.0
    container_name: otel-collector-elk
    user: "0:0"
    command: ["--config=/etc/otel-collector-config-elk.yml"]
    volumes:
      - ./docker/otel/otel-collector-config-elk.yml:/etc/otel-collector-config-elk.yml
    profiles:
      - elk
    ports:
      - "43180:4318"
      - "43170:4317"
      - "8889:8889"
    networks:
      - usage-network

  setup:
    image: curlimages/curl:8.5.0
    container_name: es-setup
    depends_on:
      - elasticsearch
    networks:
      - usage-network
    restart: "no"
    env_file:
      - .env.elk   
    entrypoint: |
      sh -c '
      echo "Waiting for Elasticsearch..."

      until curl -s -u elastic:${ELASTIC_SEARCH_PASSWORD} http://elasticsearch:9200 | grep -q "cluster_name"; do
        sleep 5
      done

      echo "Elasticsearch is ready"

      echo "Creating role logstash_writer..."
      curl -s -u elastic:${ELASTIC_SEARCH_PASSWORD} -X PUT "http://elasticsearch:9200/_security/role/logstash_writer" \
        -H "Content-Type: application/json" \
        -d "{
          \"cluster\": [\"monitor\"],
          \"indices\": [
            {
              \"names\": [\"saas-logs-*\"] ,
              \"privileges\": [\"write\",\"create\",\"create_index\"]
            }
          ]
        }"

      echo "Creating user logstash_user..."
      curl -s -u elastic:${ELASTIC_SEARCH_PASSWORD} -X PUT "http://elasticsearch:9200/_security/user/logstash_user" \
        -H "Content-Type: application/json" \
        -d "{
          \"password\": \"logstash_pass\",
          \"roles\": [\"logstash_writer\"]
        }"

      echo "Setup complete!"
      '

networks:
  usage-network:
    external: true

volumes:
  elasticsearch_data:
